apiVersion: batch/v1
kind: Job
metadata:
  name: rhi-repro-{{ORX_RUN}}
spec:
  template:
    spec:
      restartPolicy: Never
      nodeSelector:
        nvidia.com/gpu.product: NVIDIA-RTX-PRO-6000-Blackwell-Server-Edition
      containers:
        - name: run
          image: nvcr.io/nvidia/pytorch:25.06-py3
          command: ["bash", "-c", "$ORX_SCRIPT"]
          env:
            - name: HF_HOME
              value: /workspace/hf-cache
            - name: TOKENIZERS_PARALLELISM
              value: "false"
          resources:
            requests:
              nvidia.com/gpu: "4"
              cpu: "32"
              memory: 192Gi
            limits:
              nvidia.com/gpu: "4"
              cpu: "32"
              memory: 192Gi
          volumeMounts:
            - name: dshm
              mountPath: /dev/shm
      volumes:
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: 64Gi
